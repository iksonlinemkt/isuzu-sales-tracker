<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>บันทึกข้อมูล — Isuzu Sales</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC2229;--red-l:#fff0f0;
  --blue:#2563eb;--blue-l:#eff6ff;
  --green:#16a34a;--green-l:#f0fdf4;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --amber:#d97706;--amber-l:#fffbeb;
  --navy:#1e3a5f;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g400:#94a3b8;--g600:#475569;--g800:#1e293b;
}
body{font-family:'Sarabun',sans-serif;background:var(--g50);color:var(--g800);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--red);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.tb-brand{color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
.tb-logo{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:6px;font-size:12px;font-weight:800;letter-spacing:1.5px}
.tb-branch{font-size:13px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-date{color:rgba(255,255,255,.8);font-size:12px}
.online-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;box-shadow:0 0 6px #4ade80}

.container{max-width:900px;margin:0 auto;padding:18px 16px 80px}

/* CONFIG BOX */
.config-box{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.config-box h3{font-size:14px;font-weight:700;color:#1e40af;margin-bottom:10px}
.config-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.config-field label{font-size:11px;font-weight:600;color:#3b82f6;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.config-field input{width:100%;padding:7px 10px;border:1.5px solid #bfdbfe;border-radius:6px;font-size:12px;font-family:'Sarabun',sans-serif;color:var(--g800);outline:none;background:#fff}
.config-field input:focus{border-color:#2563eb}
.config-save-btn{background:#2563eb;color:#fff;border:none;padding:7px 18px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif}
.config-save-btn:hover{background:#1d4ed8}

/* DAY TABS */
.day-tabs-card{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:10px 14px;margin-bottom:14px}
.day-tabs-label{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.day-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px}
.day-tabs::-webkit-scrollbar{height:3px}
.day-tabs::-webkit-scrollbar-track{background:var(--g100)}
.day-tabs::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
.dtab{flex-shrink:0;padding:4px 9px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--g200);background:#fff;color:var(--g400);font-family:'Sarabun',sans-serif;text-align:center;min-width:36px;line-height:1.4}
.dtab .dnum{font-size:13px;font-weight:800}
.dtab .dname{font-size:9px;opacity:.7}
.dtab.has-data{border-color:var(--green);color:var(--green);background:var(--green-l)}
.dtab.no-data{border-color:var(--amber);color:var(--amber);background:var(--amber-l)}
.dtab.future{opacity:.4;cursor:default}
.dtab.today{border-color:var(--red);color:var(--red);background:var(--red-l)}
.dtab.selected{box-shadow:0 0 0 2.5px var(--navy)}

/* SUMMARY */
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
.sum-card{background:#fff;border:1px solid var(--g200);border-radius:9px;padding:10px 14px;text-align:center}
.sum-lbl{font-size:10px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.4px}
.sum-val{font-size:24px;font-weight:800;margin-top:3px}

/* HEATMAP */
.hmap-card{background:#fff;border:1px solid var(--g200);border-radius:10px;margin-bottom:14px;overflow:hidden}
.hmap-card-hd{padding:11px 16px 8px;border-bottom:1px solid var(--g100);font-size:13px;font-weight:700;color:var(--g800)}
.hmap-body{padding:12px 16px;overflow-x:auto}
.hmap-table{border-collapse:separate;border-spacing:2px;font-size:10px}
.hmap-table .rlbl{font-size:11px;font-weight:600;color:var(--g600);padding-right:10px;white-space:nowrap;min-width:120px;vertical-align:middle}
.hmap-table .dhd{text-align:center;color:var(--g400);font-weight:600;padding:0 0 3px;font-size:9px;min-width:16px}
.hcell{width:16px;height:16px;border-radius:3px;display:block;cursor:default}
.hc-full{background:#16a34a}.hc-part{background:#86efac}.hc-none{background:#e2e8f0}.hc-today{background:var(--red)}.hc-future{background:#f1f5f9}
.hlgd{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:10px;color:var(--g400);flex-wrap:wrap}
.hlgd span{display:flex;align-items:center;gap:4px}
.hbox{width:11px;height:11px;border-radius:2px;flex-shrink:0}

/* PERSON CARDS */
.section-lbl{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.pcard{background:#fff;border:1.5px solid var(--g200);border-radius:12px;overflow:hidden;transition:box-shadow .15s}
.pcard:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.pcard-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 8px;border-bottom:1px solid var(--g100)}
.pcard-name{font-size:14px;font-weight:700}
.pcard-team{font-size:10px;color:var(--g400);margin-top:1px}
.badge-ok{font-size:10px;background:var(--green-l);color:var(--green);padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.badge-no{font-size:10px;background:var(--red-l);color:var(--red);padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.model-tabs{display:flex;border-bottom:1px solid var(--g100)}
.mtab{flex:1;text-align:center;font-size:12px;font-weight:600;padding:7px;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Sarabun',sans-serif}
.mtab.active{color:var(--red);border-bottom-color:var(--red);background:var(--red-l)}
.pcard-panel{display:none;padding:11px 14px 0}
.pcard-panel.active{display:block}
.fields-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.field-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px}
.field-lbl.l{color:var(--blue)}.field-lbl.p{color:var(--purple)}.field-lbl.b{color:var(--green)}
.field-inp{width:100%;text-align:center;font-size:20px;font-weight:800;padding:7px 4px;border:1.5px solid var(--g200);border-radius:7px;background:var(--g50);color:var(--g800);outline:none;font-family:'Sarabun',sans-serif;-moz-appearance:textfield}
.field-inp::-webkit-outer-spin-button,.field-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.field-inp:focus{border-color:var(--navy);background:#fff}

/* BK DETAIL */
.bk-detail{background:var(--g50);border-radius:8px;padding:9px 11px;margin-bottom:9px;display:none}
.bk-detail.show{display:block}
.bk-detail-title{font-size:10px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.3px;margin-bottom:7px}
.bk-fields{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.bk-lbl{font-size:10px;font-weight:600;color:var(--g600);margin-bottom:3px;display:block}
.bk-sel{width:100%;padding:6px 8px;border:1.5px solid var(--g200);border-radius:6px;font-size:12px;font-family:'Sarabun',sans-serif;color:var(--g800);background:#fff;outline:none}
.bk-sel:focus{border-color:var(--navy)}

.save-btn{width:calc(100% - 28px);margin:0 14px 12px;padding:9px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.save-btn:hover{background:#b81e24}
.save-btn.saved{background:var(--green)}
.save-btn.saving{background:var(--g400);cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--g800);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;transition:transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* OFFLINE BANNER */
.offline-banner{background:#fef3c7;border-bottom:1px solid #fde68a;padding:7px 18px;font-size:12px;color:#92400e;font-weight:600;text-align:center;display:none}
.offline-banner.show{display:block}
</style>
</head>
<body>

<div class="offline-banner" id="offline-banner">⚠️ ออฟไลน์อยู่ — ข้อมูลจะบันทึกเมื่อกลับมาออนไลน์</div>

<div class="topbar">
  <div class="tb-brand">
    <div class="tb-logo">ISUZU</div>
    <div class="tb-branch" id="tb-branch">สาขา —</div>
  </div>
  <div class="tb-right">
    <div class="tb-date" id="tb-date">—</div>
    <div class="online-dot" id="online-dot" title="เชื่อมต่อแล้ว"></div>
  </div>
</div>

<div class="container">

  <!-- CONFIG (แสดงครั้งแรก) -->
  <div class="config-box" id="config-box">
    <h3>⚙️ ตั้งค่าเชื่อม Supabase (ครั้งแรกเท่านั้น)</h3>
    <div class="config-row">
      <div class="config-field">
        <label>Supabase URL</label>
        <input type="text" id="cfg-url" placeholder="https://xxxx.supabase.co">
      </div>
      <div class="config-field">
        <label>Supabase Anon Key</label>
        <input type="text" id="cfg-key" placeholder="eyJhbGciOiJ...">
      </div>
    </div>
    <button class="config-save-btn" onclick="saveConfig()">บันทึกและเชื่อมต่อ</button>
  </div>

  <!-- DAY TABS -->
  <div class="day-tabs-card">
    <div class="day-tabs-label">เลือกวันที่บันทึก</div>
    <div class="day-tabs" id="day-tabs"></div>
  </div>

  <!-- SUMMARY -->
  <div class="sum-row">
    <div class="sum-card"><div class="sum-lbl">Lead</div><div class="sum-val" id="sum-lead" style="color:var(--blue)">0</div></div>
    <div class="sum-card"><div class="sum-lbl">PS</div><div class="sum-val" id="sum-ps" style="color:var(--purple)">0</div></div>
    <div class="sum-card"><div class="sum-lbl">BK</div><div class="sum-val" id="sum-bk" style="color:var(--green)">0</div></div>
    <div class="sum-card"><div class="sum-lbl">รวม</div><div class="sum-val" id="sum-total" style="color:var(--red)">0</div></div>
  </div>

  <!-- HEATMAP -->
  <div class="hmap-card">
    <div class="hmap-card-hd">📅 สถานะการลงข้อมูล — รายเซล</div>
    <div class="hmap-body">
      <div id="heatmap"></div>
      <div class="hlgd">
        <span><span class="hbox hc-full"></span>ลงครบ (P-UP + MU-X)</span>
        <span><span class="hbox hc-part"></span>ลงบางส่วน</span>
        <span><span class="hbox hc-none"></span>ไม่ได้คีย์</span>
        <span><span class="hbox hc-today"></span>วันนี้</span>
      </div>
    </div>
  </div>

  <!-- PERSON CARDS -->
  <div class="section-lbl" id="section-lbl">รายชื่อเซล</div>
  <div class="person-grid" id="person-grid">
    <div style="text-align:center;padding:40px;color:var(--g400);font-size:14px;grid-column:1/-1">กำลังโหลด...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════ CONFIG ═══════════════
var BRANCH = (new URLSearchParams(window.location.search).get('branch')) || localStorage.getItem('branch') || 'บางเสาธง';
var SUPABASE_URL = localStorage.getItem('sb_url') || '';
var SUPABASE_KEY = localStorage.getItem('sb_key') || '';
var sb = null;
var SALES_LIST = [];
var MODELS_LIST = ['P-UP','MU-X'];
var CAR_MODELS = [];
var CAREERS = [];
var ENTRY_CACHE = {};
var selectedDay = new Date().getDate();
var TODAY = new Date().getDate();
var MONTH = new Date().getMonth();
var YEAR = new Date().getFullYear();
var DAYS_IN_MONTH = new Date(YEAR, MONTH+1, 0).getDate();
var DAY_NAMES = ['อา','จ','อ','พ','พฤ','ศ','ส'];
var MONTH_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function initSupabase() {
  if (!SUPABASE_URL || !SUPABASE_KEY) return false;
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    return true;
  } catch(e) { return false; }
}

function saveConfig() {
  var url = document.getElementById('cfg-url').value.trim();
  var key = document.getElementById('cfg-key').value.trim();
  if (!url || !key) { showToast('กรุณาใส่ URL และ Key ให้ครบ'); return; }
  localStorage.setItem('sb_url', url);
  localStorage.setItem('sb_key', key);
  SUPABASE_URL = url; SUPABASE_KEY = key;
  if (initSupabase()) {
    document.getElementById('config-box').style.display = 'none';
    loadAll();
    showToast('✅ เชื่อมต่อ Supabase สำเร็จ');
  } else {
    showToast('❌ เชื่อมต่อไม่ได้ กรุณาตรวจสอบ URL/Key');
  }
}

// ═══════════════ LOAD DATA ═══════════════
async function loadAll() {
  if (!sb) return;
  setOnline(true);
  try {
    // Load settings
    var { data: settingsData } = await sb.from('settings').select('*').in('branch', [BRANCH, 'ALL']);
    if (settingsData) {
      settingsData.forEach(function(row) {
        if (row.key === 'sales_list' && row.branch === BRANCH) SALES_LIST = row.value;
        if (row.key === 'models') CAR_MODELS = row.value;
        if (row.key === 'careers') CAREERS = row.value;
      });
    }
    // Load entries for this month
    var dateStart = YEAR+'-'+pad(MONTH+1)+'-01';
    var dateEnd = YEAR+'-'+pad(MONTH+1)+'-'+pad(DAYS_IN_MONTH);
    var { data: entriesData } = await sb.from('entries').select('*')
      .eq('branch', BRANCH).gte('entry_date', dateStart).lte('entry_date', dateEnd);
    if (entriesData) {
      entriesData.forEach(function(row) {
        var day = new Date(row.entry_date).getDate();
        var k = day+'|'+row.sales_name+'|'+row.model;
        ENTRY_CACHE[k] = row;
      });
    }
    renderAll();
    subscribeRealtime();
  } catch(e) {
    setOnline(false);
    renderAll();
  }
}

function subscribeRealtime() {
  if (!sb) return;
  sb.channel('entries-'+BRANCH)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'entries', filter: 'branch=eq.'+BRANCH },
      function(payload) {
        var row = payload.new || payload.old;
        if (!row) return;
        var day = new Date(row.entry_date).getDate();
        var k = day+'|'+row.sales_name+'|'+row.model;
        if (payload.eventType === 'DELETE') delete ENTRY_CACHE[k];
        else ENTRY_CACHE[k] = row;
        renderAll();
      })
    .subscribe();
}

function setOnline(isOnline) {
  document.getElementById('online-dot').style.background = isOnline ? '#4ade80' : '#f87171';
  document.getElementById('online-dot').style.boxShadow = isOnline ? '0 0 6px #4ade80' : '0 0 6px #f87171';
  document.getElementById('offline-banner').classList.toggle('show', !isOnline);
}

// ═══════════════ RENDER ═══════════════
function renderAll() {
  renderHeader();
  renderDayTabs();
  renderHeatmap();
  renderPersonGrid();
  updateSummary();
}

function renderHeader() {
  document.getElementById('tb-branch').textContent = 'สาขา' + BRANCH;
  document.title = 'บันทึก — สาขา' + BRANCH;
  var d = new Date();
  var days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  document.getElementById('tb-date').textContent = days[d.getDay()] + ' ' + d.getDate() + ' ' + MONTH_TH[d.getMonth()] + ' ' + (d.getFullYear()+543);
  document.getElementById('section-lbl').textContent = 'รายชื่อเซล — ' + MONTH_TH[MONTH] + ' ' + (YEAR+543);
}

function renderDayTabs() {
  var wrap = document.getElementById('day-tabs');
  wrap.innerHTML = '';
  for (var d = 1; d <= DAYS_IN_MONTH; d++) {
    var dt = new Date(YEAR, MONTH, d);
    var dayName = DAY_NAMES[dt.getDay()];
    var isToday = d === TODAY;
    var isFuture = d > TODAY;
    var hasFull = SALES_LIST.length > 0 && SALES_LIST.every(function(s) {
      return MODELS_LIST.every(function(m) {
        var k = d+'|'+s.name+'|'+m;
        var rec = ENTRY_CACHE[k];
        return rec && (rec.lead || rec.ps || rec.bk);
      });
    });
    var hasPart = !hasFull && SALES_LIST.some(function(s) {
      return MODELS_LIST.some(function(m) {
        var k = d+'|'+s.name+'|'+m;
        var rec = ENTRY_CACHE[k];
        return rec && (rec.lead || rec.ps || rec.bk);
      });
    });
    var btn = document.createElement('button');
    btn.className = 'dtab ' + (isToday ? 'today' : isFuture ? 'future' : hasFull ? 'has-data' : hasPart ? 'has-data' : 'no-data');
    if (d === selectedDay) btn.classList.add('selected');
    btn.innerHTML = '<div class="dname">'+dayName+'</div><div class="dnum">'+d+'</div>';
    if (!isFuture) {
      btn.onclick = (function(day){ return function(){ selectedDay = day; renderDayTabs(); renderPersonGrid(); updateSummary(); }; })(d);
    }
    wrap.appendChild(btn);
  }
  // Scroll to today
  if (TODAY >= 7) {
    setTimeout(function(){ var tabs = document.getElementById('day-tabs'); tabs.scrollLeft = (TODAY-4)*44; }, 100);
  }
}

function renderHeatmap() {
  var el = document.getElementById('heatmap');
  if (!el || !SALES_LIST.length) return;
  var html = '<table class="hmap-table"><tr><td class="rlbl"></td>';
  for (var d=1; d<=DAYS_IN_MONTH; d++) html += '<td class="dhd">'+d+'</td>';
  html += '</tr>';
  SALES_LIST.forEach(function(person) {
    html += '<tr><td class="rlbl">'+person.name+'</td>';
    for (var d=1; d<=DAYS_IN_MONTH; d++) {
      var isToday = d===TODAY;
      var isFuture = d>TODAY;
      var cls = 'hc-future';
      if (isToday) cls = 'hc-today';
      else if (!isFuture) {
        var hasFull = MODELS_LIST.every(function(m){ var k=d+'|'+person.name+'|'+m; var rec=ENTRY_CACHE[k]; return rec&&(rec.lead||rec.ps||rec.bk); });
        var hasPart = MODELS_LIST.some(function(m){ var k=d+'|'+person.name+'|'+m; var rec=ENTRY_CACHE[k]; return rec&&(rec.lead||rec.ps||rec.bk); });
        cls = hasFull ? 'hc-full' : hasPart ? 'hc-part' : 'hc-none';
      }
      html += '<td><span class="hcell '+cls+'" title="'+person.name+' วัน'+d+'"></span></td>';
    }
    html += '</tr>';
  });
  html += '</table>';
  el.innerHTML = html;
}

function renderPersonGrid() {
  var grid = document.getElementById('person-grid');
  if (!SALES_LIST.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--g400);font-size:14px;grid-column:1/-1">ไม่พบรายชื่อเซล — กรุณาตั้งค่าใน Admin</div>';
    return;
  }
  grid.innerHTML = '';
  SALES_LIST.forEach(function(person) {
    grid.appendChild(buildPersonCard(person));
  });
}

function buildPersonCard(person) {
  var div = document.createElement('div');
  div.className = 'pcard';
  var nameKey = person.name.replace(/\s/g,'_');
  var hasSaved = MODELS_LIST.some(function(m) {
    var k = selectedDay+'|'+person.name+'|'+m;
    var rec = ENTRY_CACHE[k];
    return rec && (rec.lead || rec.ps || rec.bk);
  });

  var modelsHtml = MODELS_LIST.map(function(m,i) {
    var k = selectedDay+'|'+person.name+'|'+m;
    var rec = ENTRY_CACHE[k] || {};
    var bkVal = parseInt(rec.bk)||0;
    return '<div class="pcard-panel'+(i===0?' active':'')+'" id="panel-'+nameKey+'-'+m+'">'
      +'<div class="fields-row">'
      +'<div><span class="field-lbl l">Lead</span><input class="field-inp" type="number" min="0" placeholder="0" value="'+(rec.lead||'')+'" id="inp-'+nameKey+'-'+m+'-lead" oninput="updateSummary()"></div>'
      +'<div><span class="field-lbl p">PS</span><input class="field-inp" type="number" min="0" placeholder="0" value="'+(rec.ps||'')+'" id="inp-'+nameKey+'-'+m+'-ps" oninput="updateSummary()"></div>'
      +'<div><span class="field-lbl b">BK</span><input class="field-inp" type="number" min="0" placeholder="0" value="'+(rec.bk||'')+'" id="inp-'+nameKey+'-'+m+'-bk" oninput="onBKChange(\''+nameKey+'\',\''+m+'\')"></div>'
      +'</div>'
      +'<div class="bk-detail'+(bkVal>0?' show':'')+'" id="bk-'+nameKey+'-'+m+'">'
      +'<div class="bk-detail-title">📋 รายละเอียดการจอง (BK)</div>'
      +'<div class="bk-fields">'
      +'<div><span class="bk-lbl">รุ่นรถที่จอง</span><select class="bk-sel" id="bk-car-'+nameKey+'-'+m+'">'+CAR_MODELS.map(function(c){ return '<option'+(rec.bk_car_model===c?' selected':'')+'>'+c+'</option>'; }).join('')+'</select></div>'
      +'<div><span class="bk-lbl">อาชีพลูกค้า</span><select class="bk-sel" id="bk-career-'+nameKey+'-'+m+'">'+CAREERS.map(function(c){ return '<option'+(rec.bk_career===c?' selected':'')+'>'+c+'</option>'; }).join('')+'</select></div>'
      +'</div></div>'
      +'<button class="save-btn'+(hasSaved?' saved':'')+'" id="savebtn-'+nameKey+'-'+m+'" onclick="saveEntry(\''+person.name+'\',\''+m+'\')">'
      +(hasSaved?'✓ บันทึก '+m+' แล้ว':'💾 บันทึก '+m)
      +'</button>'
      +'</div>';
  }).join('');

  div.innerHTML = '<div class="pcard-hd"><div><div class="pcard-name">'+person.name+'</div><div class="pcard-team">'+person.team+'</div></div>'
    +'<span class="'+(hasSaved?'badge-ok':'badge-no')+'" id="badge-'+nameKey+'">'+(hasSaved?'✓ บันทึกแล้ว':'ยังไม่กรอก')+'</span></div>'
    +'<div class="model-tabs">'
    +MODELS_LIST.map(function(m,i){ return '<button class="mtab'+(i===0?' active':'')+'" onclick="switchMtab(\''+nameKey+'\',\''+m+'\')">'+m+'</button>'; }).join('')
    +'</div>'
    +modelsHtml;
  return div;
}

function switchMtab(nameKey, model) {
  var card = document.querySelector('[id="savebtn-'+nameKey+'-'+MODELS_LIST[0]+'"]')?.closest('.pcard');
  if (!card) return;
  card.querySelectorAll('.mtab').forEach(function(t){ t.classList.toggle('active', t.textContent===model); });
  MODELS_LIST.forEach(function(m){ var p=document.getElementById('panel-'+nameKey+'-'+m); if(p) p.classList.toggle('active', m===model); });
}

function onBKChange(nameKey, model) {
  var val = parseInt(document.getElementById('inp-'+nameKey+'-'+model+'-bk')?.value)||0;
  var det = document.getElementById('bk-'+nameKey+'-'+model);
  if (det) det.classList.toggle('show', val > 0);
  updateSummary();
}

// ═══════════════ SAVE ═══════════════
async function saveEntry(salesName, model) {
  var nameKey = salesName.replace(/\s/g,'_');
  var lead = parseInt(document.getElementById('inp-'+nameKey+'-'+model+'-lead')?.value)||0;
  var ps   = parseInt(document.getElementById('inp-'+nameKey+'-'+model+'-ps')?.value)||0;
  var bk   = parseInt(document.getElementById('inp-'+nameKey+'-'+model+'-bk')?.value)||0;
  var bk_car_model = document.getElementById('bk-car-'+nameKey+'-'+model)?.value||'';
  var bk_career    = document.getElementById('bk-career-'+nameKey+'-'+model)?.value||'';

  var btn = document.getElementById('savebtn-'+nameKey+'-'+model);
  if (btn) { btn.textContent = '⏳ กำลังบันทึก...'; btn.className = 'save-btn saving'; btn.disabled = true; }

  var dateStr = YEAR+'-'+pad(MONTH+1)+'-'+pad(selectedDay);
  var payload = { branch: BRANCH, sales_name: salesName, team: (SALES_LIST.find(function(s){return s.name===salesName;})||{}).team||'', model, entry_date: dateStr, lead, ps, bk, bk_car_model, bk_career };

  var k = selectedDay+'|'+salesName+'|'+model;
  ENTRY_CACHE[k] = Object.assign({}, payload);

  if (sb) {
    try {
      await sb.from('entries').upsert(payload, { onConflict: 'branch,sales_name,model,entry_date' });
      setOnline(true);
    } catch(e) {
      setOnline(false);
      var offline = JSON.parse(localStorage.getItem('offline_queue')||'[]');
      offline.push(payload);
      localStorage.setItem('offline_queue', JSON.stringify(offline));
    }
  } else {
    // localStorage fallback
    localStorage.setItem('entry_'+k, JSON.stringify(payload));
  }

  if (btn) { btn.textContent = '✓ บันทึก '+model+' แล้ว'; btn.className = 'save-btn saved'; btn.disabled = false; }
  var badge = document.getElementById('badge-'+nameKey);
  if (badge) { badge.textContent='✓ บันทึกแล้ว'; badge.className='badge-ok'; }
  renderDayTabs();
  renderHeatmap();
  updateSummary();
  showToast('✅ บันทึก '+salesName+' · '+model+' แล้ว');
}

function updateSummary() {
  var tL=0,tP=0,tB=0;
  SALES_LIST.forEach(function(person) {
    var nameKey = person.name.replace(/\s/g,'_');
    MODELS_LIST.forEach(function(m) {
      tL += parseInt(document.getElementById('inp-'+nameKey+'-'+m+'-lead')?.value)||0;
      tP += parseInt(document.getElementById('inp-'+nameKey+'-'+m+'-ps')?.value)||0;
      tB += parseInt(document.getElementById('inp-'+nameKey+'-'+m+'-bk')?.value)||0;
    });
  });
  document.getElementById('sum-lead').textContent = tL;
  document.getElementById('sum-ps').textContent = tP;
  document.getElementById('sum-bk').textContent = tB;
  document.getElementById('sum-total').textContent = tL+tP+tB;
}

function pad(n){ return n<10?'0'+n:String(n); }

// ═══════════════ TOAST ═══════════════
var toastT;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ═══════════════ INIT ═══════════════
window.addEventListener('online', function(){ setOnline(true); });
window.addEventListener('offline', function(){ setOnline(false); });

window.addEventListener('load', function() {
  document.getElementById('cfg-url').value = SUPABASE_URL;
  document.getElementById('cfg-key').value = SUPABASE_KEY;
  if (SUPABASE_URL && SUPABASE_KEY) {
    document.getElementById('config-box').style.display = 'none';
    if (initSupabase()) loadAll();
} else {
    // Demo mode with local data
    SALES_LIST = [{name:'ประยูร เครือญัญา',team:'ทีม A'},{name:'สุดารัก เกศธิญัณน์',team:'ทีม A'},{name:'สถิตย์ หอมเจือม',team:'ทีม B'}];
    CAR_MODELS = ['P-UP','MU-X','D-MAX 4WD','D-MAX 2WD'];
    CAREERS = ['เกษตรกร','รับราชการ','พนักงานบริษัท','ธุรกิจส่วนตัว','รับจ้างทั่วไป'];
    renderAll();
  }
});
</script>
